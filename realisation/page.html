<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réalisation - Portfolio BTS SIO</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../projet/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav id="navbar" class="scrolled">
      <div class="nav-container">
        <a href="../index.html" id="logo">
          Portfolio <span class="logo-italic">BTS SIO</span>
        </a>
        <ul class="nav-links">
          <li>
            <a href="../index.html" class="nav-link"
              >Accueil<span class="nav-underline"></span
            ></a>
          </li>
          <li>
            <a href="../index.html#profil" class="nav-link"
              >Profil<span class="nav-underline"></span
            ></a>
          </li>
          <li>
            <a href="../index.html#competences" class="nav-link"
              >Compétences<span class="nav-underline"></span
            ></a>
          </li>
          <li>
            <a href="../index.html#realisations" class="nav-link"
              >Projets<span class="nav-underline"></span
            ></a>
          </li>
          <li>
            <a href="../index.html#contact" class="nav-cta">Me contacter</a>
          </li>
        </ul>
        <button id="hamburger" aria-label="Toggle menu">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
      <div id="mobile-menu" class="hidden">
        <a href="../index.html" class="nav-mobile-link">Accueil</a>
        <a href="../index.html#profil" class="nav-mobile-link">Profil</a>
        <a href="../index.html#competences" class="nav-mobile-link"
          >Compétences</a
        >
        <a href="../index.html#realisations" class="nav-mobile-link">Projets</a>
        <a href="../index.html#contact" class="nav-mobile-link">Me contacter</a>
      </div>
    </nav>

    <!-- Contenu de la réalisation -->
    <main class="detail-page">
      <div class="detail-container">
        <!-- Bouton retour -->
        <a href="../index.html#realisations" class="back-button">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          Retour aux réalisations
        </a>

        <!-- Contenu principal -->
        <div id="realisation-content" class="detail-content">
          <!-- Chargé dynamiquement -->
        </div>
      </div>
    </main>

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loader-container">
        <div class="loader-spinner">
          <div class="spinner-ring"></div>
          <div class="spinner-ring"></div>
          <div class="spinner-ring"></div>
          <div class="spinner-dot"></div>
        </div>
        <div class="loader-text">
          <p id="loader-status" class="loader-status">
            Chargement de la réalisation...
          </p>
          <p id="loader-tip" class="loader-tip">Récupération des détails</p>
        </div>
        <div class="loader-progress">
          <div id="loader-progress-bar" class="loader-progress-bar"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
